<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 215 158">
  <style>
    @keyframes pw {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
    circle {
      transform-box: fill-box;
      transform-origin: center;
      animation: pw 2.5s ease-in-out infinite;
    }
    .w0 { animation-delay: 0s; }
    .w1 { animation-delay: 0.2s; }
    .w2 { animation-delay: 0.4s; }
    .w3 { animation-delay: 0.6s; }
    .w4 { animation-delay: 0.8s; }
    .w5 { animation-delay: 1.0s; }
    .w6 { animation-delay: 1.2s; }
    .w7 { animation-delay: 1.4s; }
  </style>

  <!-- Г: вертикальная часть (большие кружки слева) -->
  <circle cx="18" cy="18"  r="13.5" fill="#E8621A" class="w0"/>
