<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 790 225">
  <defs>
    <linearGradient id="grd" x1="0" y1="0" x2="790" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E8621A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes pw { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    @keyframes tw { 0%,100%{opacity:1} 50%{opacity:0.78} }
    circle { transform-box:fill-box; transform-origin:center; animation:pw 2.5s ease-in-out infinite; }
    .w0{animation-delay:0s}    .w1{animation-delay:.15s}
    .w2{animation-delay:.3s}   .w3{animation-delay:.45s}
    .w4{animation-delay:.6s}   .w5{animation-delay:.75s}
    .w6{animation-delay:.9s}   .w7{animation-delay:1.05s}
    .w8{animation-delay:1.2s}
    .lt{animation:tw 2.5s ease-in-out infinite .5s}
  </style>

  <!--
    Шары 5 уровней: r = [24, 19, 15, 12, 9]
    Y-позиции (gap=5px): cy = [29, 77, 116, 148, 174]
    X-позиции горизонтали (те же формулы): cx = [29, 77, 116, 148, 174]

    Топ всех угловых шаров: cy-r = 29-24 = 5
    Топ текста НОВОСЁЛА: baseline(41) - cap-height(36) = 5  ← совпадает ✓
    Всё на одной прямой сверху.
  -->

  <!-- ══════ Г ══════ -->
  <!-- Угловой шар (самый большой, вверху слева) -->
  <circle cx="29"  cy="29"  r="24" fill="url(#grd)" class="w0"/>
  <!-- Горизонтальный штрих → (убывают вправо) -->
  <circle cx="77"  cy="29"  r="19" fill="url(#grd)" class="w1"/>
  <circle cx="116" cy="29"  r="15" fill="url(#grd)" class="w2"/>
  <circle cx="148" cy="29"  r="12" fill="url(#grd)" class="w3"/>
  <circle cx="174" cy="29"  r="9"  fill="url(#grd)" class="w4"/>
  <!-- Вертикальный штрих ↓ (убывают вниз) -->
  <circle cx="29"  cy="77"  r="19" fill="url(#grd)" class="w1"/>
  <circle cx="29"  cy="116" r="15" fill="url(#grd)" class="w2"/>
  <circle cx="29"  cy="148" r="12" fill="url(#grd)" class="w3"/>
  <circle cx="29"  cy="174" r="9"  fill="url(#grd)" class="w4"/>

  <!-- ══════ И ══════ -->
  <!-- Левый вертикальный штрих -->
  <circle cx="227" cy="29"  r="24" fill="url(#grd)" class="w5"/>
  <circle cx="227" cy="77"  r="19" fill="url(#grd)" class="w5"/>
  <circle cx="227" cy="116" r="15" fill="url(#grd)" class="w5"/>
  <circle cx="227" cy="148" r="12" fill="url(#grd)" class="w5"/>
  <circle cx="227" cy="174" r="9"  fill="url(#grd)" class="w5"/>
  <!-- Диагональный штрих (вверх-право → вниз-лево, как в букве И) -->
  <circle cx="281" cy="65"  r="12" fill="url(#grd)" class="w5"/>
  <circle cx="270" cy="87"  r="11" fill="url(#grd)" class="w5"/>
  <circle cx="259" cy="109" r="10" fill="url(#grd)" class="w6"/>
  <circle cx="249" cy="131" r="10" fill="url(#grd)" class="w6"/>
  <circle cx="238" cy="152" r="9"  fill="url(#grd)" class="w6"/>
  <!-- Правый вертикальный штрих -->
  <circle cx="299" cy="29"  r="24" fill="url(#grd)" class="w6"/>
  <circle cx="299" cy="77"  r="19" fill="url(#grd)" class="w6"/>
  <circle cx="299" cy="116" r="15" fill="url(#grd)" class="w6"/>
  <circle cx="299" cy="148" r="12" fill="url(#grd)" class="w6"/>
  <circle cx="299" cy="174" r="9"  fill="url(#grd)" class="w6"/>

  <!-- ══════ Д ══════ -->
  <!-- Левый вертикальный штрих -->
  <circle cx="367" cy="29"  r="24" fill="url(#grd)" class="w7"/>
  <circle cx="367" cy="77"  r="19" fill="url(#grd)" class="w7"/>
  <circle cx="367" cy="116" r="15" fill="url(#grd)" class="w7"/>
  <circle cx="367" cy="148" r="12" fill="url(#grd)" class="w7"/>
  <circle cx="367" cy="174" r="9"  fill="url(#grd)" class="w7"/>
  <!-- Верхняя перекладина (соединяет левый и правый штрихи вверху) -->
  <circle cx="403" cy="29"  r="13" fill="url(#grd)" class="w7"/>
  <!-- Правый вертикальный штрих -->
  <circle cx="439" cy="29"  r="24" fill="url(#grd)" class="w8"/>
  <circle cx="439" cy="77"  r="19" fill="url(#grd)" class="w8"/>
  <circle cx="439" cy="116" r="15" fill="url(#grd)" class="w8"/>
  <circle cx="439" cy="148" r="12" fill="url(#grd)" class="w8"/>
  <circle cx="439" cy="174" r="9"  fill="url(#grd)" class="w8"/>
  <!-- Ножки Д (выступают ниже и наружу, как у буквы Д) -->
  <circle cx="358" cy="187" r="9"  fill="url(#grd)" class="w7"/>
  <circle cx="448" cy="187" r="9"  fill="url(#grd)" class="w8"/>

  <!--
    НОВОСЁЛА — справа от ГИД, на одном уровне с верхними шарами.
    y=41: cap-top = 41 - 50×0.72 = 5 = верх шаров (cy=29, r=24 → top=5) ✓
  -->
  <text
    x="485" y="41"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="50"
    font-weight="800"
    fill="url(#grd)"
    textLength="280"
    lengthAdjust="spacingAndGlyphs"
    class="lt">НОВОСЁЛА</text>
</svg>
