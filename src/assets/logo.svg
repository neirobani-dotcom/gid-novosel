<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 200">
  <defs>
    <linearGradient id="grd" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E8621A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes corner-anim {
      0%,100% { transform:scale(1);    fill:#E8621A; }
      50%     { transform:scale(1.38); fill:#F5A623; }
    }
    @keyframes blink {
      0%,100% { opacity:1; }
      50%     { opacity:0.28; }
    }
    .corner { transform-box:fill-box; transform-origin:center; animation:corner-anim 2s ease-in-out infinite; }
    .b1 { animation:blink 3s ease-in-out infinite 0.2s; }
    .b2 { animation:blink 3s ease-in-out infinite 0.4s; }
    .b3 { animation:blink 3s ease-in-out infinite 0.6s; }
    .b4 { animation:blink 3s ease-in-out infinite 0.8s; }
    .b5 { animation:blink 3s ease-in-out infinite 1.0s; }
  </style>

  <!--
    БУКВА Г из шаров
    ─────────────────────────────────────────
    Горизонталь: 6 одинаковых r=22, gap=5px
      cy=27, cx = 27 76 125 174 223 272
      Верх: 27-22 = 5

    Вертикаль: 6 убывающих, cx=27
      r  = 22 → 17 → 13 → 10 → 8 → 6
      cy = 27 → 71 → 106 → 134 → 157 → 176
      Низ: 176+6 = 182   →   центр Г по Y = (5+182)/2 ≈ 93
  -->

  <!-- Угловой шар — самый большой, пульсирует и переливается -->
  <circle cx="27"  cy="27"  r="22" fill="#E8621A" class="corner"/>

  <!-- Горизонтальный штрих (шары 2-6, одинаковые r=22) -->
  <circle cx="76"  cy="27"  r="22" fill="url(#grd)" class="b1"/>
  <circle cx="125" cy="27"  r="22" fill="url(#grd)" class="b2"/>
  <circle cx="174" cy="27"  r="22" fill="url(#grd)" class="b3"/>
  <circle cx="223" cy="27"  r="22" fill="url(#grd)" class="b4"/>
  <circle cx="272" cy="27"  r="22" fill="url(#grd)" class="b5"/>

  <!-- Вертикальный штрих (шары 2-6, убывающие) -->
  <circle cx="27"  cy="71"  r="17" fill="url(#grd)" class="b1"/>
  <circle cx="27"  cy="106" r="13" fill="url(#grd)" class="b2"/>
  <circle cx="27"  cy="134" r="10" fill="url(#grd)" class="b3"/>
  <circle cx="27"  cy="157" r="8"  fill="url(#grd)" class="b4"/>
  <circle cx="27"  cy="176" r="6"  fill="url(#grd)" class="b5"/>

  <!--
    ТЕКСТ "ИД НОВОСЁЛА"
    ─────────────────────────────────────────
    Размещён справа от Г, вертикально по центру буквы.
    Г центр: y ≈ 93.  font-size=62, cap-height=44.6px
    baseline = 93 + 44.6/2 = 93 + 22.3 = 115.3 → y=115

    Г правый край горизонтали: 272+22=294
    Отступ до текста: 22px → x=316
  -->
  <text
    x="316" y="115"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="62"
    font-weight="800"
    fill="#E8621A"
    letter-spacing="2">ИД НОВОСЁЛА</text>
</svg>
