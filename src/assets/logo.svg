<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200">
  <defs>
    <!-- Общий градиент для всех шаров: оранжевый→золотой слева направо -->
    <linearGradient id="grd" x1="0" y1="0" x2="460" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E8621A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <!-- Анимированный градиент для текста НОВОСЁЛА -->
    <linearGradient id="tgrd" x1="462" y1="0" x2="840" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8621A">
        <animate attributeName="stop-color" values="#E8621A;#F5A623;#E8621A" dur="2s" begin="0s" repeatCount="indefinite"/>
      </stop>
      <stop offset="40%" stop-color="#E8621A">
        <animate attributeName="stop-color" values="#E8621A;#F5A623;#E8621A" dur="2s" begin="0.4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#F5A623">
        <animate attributeName="stop-color" values="#E8621A;#F5A623;#E8621A" dur="2s" begin="0.8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <style>
    @keyframes corner-anim {
      0%,100% { transform:scale(1);    fill:#E8621A; }
      50%     { transform:scale(1.38); fill:#F5A623; }
    }
    @keyframes blink {
      0%,100% { opacity:1; }
      50%     { opacity:0.28; }
    }
    .corner { transform-box:fill-box; transform-origin:center; animation:corner-anim 2s ease-in-out infinite; }
    .b1 { animation:blink 3s ease-in-out infinite 0.1s; }
    .b2 { animation:blink 3s ease-in-out infinite 0.3s; }
    .b3 { animation:blink 3s ease-in-out infinite 0.5s; }
    .b4 { animation:blink 3s ease-in-out infinite 0.7s; }
    .b5 { animation:blink 3s ease-in-out infinite 0.9s; }
    .b6 { animation:blink 3s ease-in-out infinite 1.1s; }
  </style>

  <!--
    Г  — угловой шар cx=27 cy=27 r=22, верх y=5, низ y=182
    И  — две колонки cx=310 и cx=362, r=12, cy=17..170
         верх: 17-12=5, низ: 170+12=182 — совпадает с Г
    Д  — две колонки cx=392 и cx=444, r=12, ножки внизу-снаружи
  -->

  <!-- ══ Г ══ -->
  <circle cx="27"  cy="27"  r="22" fill="#E8621A" class="corner"/>
  <circle cx="76"  cy="27"  r="22" fill="url(#grd)" class="b1"/>
  <circle cx="125" cy="27"  r="22" fill="url(#grd)" class="b2"/>
  <circle cx="174" cy="27"  r="22" fill="url(#grd)" class="b3"/>
  <circle cx="223" cy="27"  r="22" fill="url(#grd)" class="b4"/>
  <circle cx="272" cy="27"  r="22" fill="url(#grd)" class="b5"/>
  <circle cx="27"  cy="71"  r="17" fill="url(#grd)" class="b1"/>
  <circle cx="27"  cy="106" r="13" fill="url(#grd)" class="b2"/>
  <circle cx="27"  cy="134" r="10" fill="url(#grd)" class="b3"/>
  <circle cx="27"  cy="157" r="8"  fill="url(#grd)" class="b4"/>
  <circle cx="27"  cy="176" r="6"  fill="url(#grd)" class="b5"/>

  <!-- ══ И ══  левая колонка cx=310, правая cx=362, шаг 31px, r=12 -->
  <!-- Левая -->
  <circle cx="310" cy="17"  r="12" fill="url(#grd)" class="b1"/>
  <circle cx="310" cy="48"  r="12" fill="url(#grd)" class="b2"/>
  <circle cx="310" cy="79"  r="12" fill="url(#grd)" class="b3"/>
  <circle cx="310" cy="110" r="12" fill="url(#grd)" class="b4"/>
  <circle cx="310" cy="141" r="12" fill="url(#grd)" class="b5"/>
  <circle cx="310" cy="170" r="12" fill="url(#grd)" class="b6"/>
  <!-- Правая -->
  <circle cx="362" cy="17"  r="12" fill="url(#grd)" class="b2"/>
  <circle cx="362" cy="48"  r="12" fill="url(#grd)" class="b3"/>
  <circle cx="362" cy="79"  r="12" fill="url(#grd)" class="b4"/>
  <circle cx="362" cy="110" r="12" fill="url(#grd)" class="b5"/>
  <circle cx="362" cy="141" r="12" fill="url(#grd)" class="b6"/>
  <circle cx="362" cy="170" r="12" fill="url(#grd)" class="b1"/>
  <!-- Диагональ сверху-справа→снизу-слева: (362,17)→(310,170) -->
  <circle cx="349" cy="55"  r="9"  fill="url(#grd)" class="b3"/>
  <circle cx="336" cy="94"  r="9"  fill="url(#grd)" class="b4"/>
  <circle cx="323" cy="132" r="9"  fill="url(#grd)" class="b5"/>

  <!-- ══ Д ══  левая cx=392, правая cx=444, r=12, шаг 31px -->
  <!-- Левая -->
  <circle cx="392" cy="17"  r="12" fill="url(#grd)" class="b3"/>
  <circle cx="392" cy="48"  r="12" fill="url(#grd)" class="b4"/>
  <circle cx="392" cy="79"  r="12" fill="url(#grd)" class="b5"/>
  <circle cx="392" cy="110" r="12" fill="url(#grd)" class="b6"/>
  <circle cx="392" cy="141" r="12" fill="url(#grd)" class="b1"/>
  <circle cx="392" cy="170" r="12" fill="url(#grd)" class="b2"/>
  <!-- Верхний средний шар (перекладина) -->
  <circle cx="418" cy="17"  r="11" fill="url(#grd)" class="b4"/>
  <!-- Правая -->
  <circle cx="444" cy="17"  r="12" fill="url(#grd)" class="b5"/>
  <circle cx="444" cy="48"  r="12" fill="url(#grd)" class="b6"/>
  <circle cx="444" cy="79"  r="12" fill="url(#grd)" class="b1"/>
  <circle cx="444" cy="110" r="12" fill="url(#grd)" class="b2"/>
  <circle cx="444" cy="141" r="12" fill="url(#grd)" class="b3"/>
  <circle cx="444" cy="170" r="12" fill="url(#grd)" class="b4"/>
  <!-- Ножки Д (ниже и снаружи колонок) -->
  <circle cx="383" cy="184" r="6"  fill="url(#grd)" class="b5"/>
  <circle cx="453" cy="184" r="6"  fill="url(#grd)" class="b6"/>

  <!-- ══ НОВОСЁЛА ══ -->
  <text
    x="462" y="116"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="62"
    font-weight="800"
    fill="url(#tgrd)"
    letter-spacing="2">НОВОСЁЛА</text>
</svg>
