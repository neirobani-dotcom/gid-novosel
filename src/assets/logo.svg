<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 525 135">
  <defs>
    <linearGradient id="grd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E8621A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes pw { 0%,100%{transform:scale(1)} 50%{transform:scale(1.22)} }
    @keyframes tw { 0%,100%{opacity:1} 50%{opacity:0.78} }
    circle { transform-box:fill-box; transform-origin:center; animation:pw 2.5s ease-in-out infinite; }
    .w0{animation-delay:0s}  .w1{animation-delay:.22s} .w2{animation-delay:.44s}
    .w3{animation-delay:.66s} .w4{animation-delay:.88s} .w5{animation-delay:1.1s}
    .lt{animation:tw 2.5s ease-in-out infinite .5s}
  </style>

  <!-- Г: вертикальная часть — крупные кружки убывают вниз -->
  <circle cx="34" cy="35"  r="30" fill="#E8621A" class="w0"/>
  <circle cx="34" cy="88"  r="21" fill="#E8621A" class="w0"/>
  <circle cx="34" cy="120" r="14" fill="#E8621A" class="w0"/>

  <!-- Г: горизонтальная часть — убывают вправо -->
  <circle cx="87"  cy="35" r="21" fill="#EA6D1A" class="w1"/>
  <circle cx="130" cy="35" r="14" fill="#EC7E1B" class="w2"/>
  <circle cx="163" cy="35" r="10" fill="#EE8E1C" class="w3"/>
  <circle cx="188" cy="35" r="7"  fill="#F09B1E" class="w4"/>
  <circle cx="206" cy="35" r="5"  fill="#F2A620" class="w5"/>

  <!-- НОВОСЁЛА — крупный читаемый текст -->
  <text
    x="220" y="92"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="50"
    font-weight="800"
    letter-spacing="2"
    fill="url(#grd)"
    class="lt">НОВОСЁЛА</text>
</svg>
