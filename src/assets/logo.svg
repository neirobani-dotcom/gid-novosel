<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 270">
  <defs>
    <linearGradient id="grd" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E8621A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes pw { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
    @keyframes tw { 0%,100%{opacity:1} 50%{opacity:0.78} }
    circle { transform-box:fill-box; transform-origin:center; animation:pw 2.5s ease-in-out infinite; }
    .w0{animation-delay:0s}   .w1{animation-delay:.25s}
    .w2{animation-delay:.5s}  .w3{animation-delay:.75s}
    .w4{animation-delay:1s}
    .lt{animation:tw 2.5s ease-in-out infinite .5s}
  </style>

  <!--
    Буква Г: угловой кружок + горизонтальный штрих (слева направо, убывают)
    Г занимает ~200×155px в координатах SVG (от x=7 до x=297, y=7 до y=202)
  -->
  <circle cx="75"  cy="75" r="68" fill="url(#grd)" class="w0"/>
  <circle cx="178" cy="75" r="45" fill="url(#grd)" class="w1"/>
  <circle cx="236" cy="75" r="27" fill="url(#grd)" class="w2"/>
  <circle cx="268" cy="75" r="16" fill="url(#grd)" class="w3"/>
  <circle cx="288" cy="75" r="9"  fill="url(#grd)" class="w4"/>

  <!-- Буква Г: вертикальный штрих вниз -->
  <circle cx="75"  cy="160" r="42" fill="url(#grd)" class="w0"/>

  <!--
    НОВОСЁЛА — снизу по центру, оранжевый цвет.
    textLength фиксирует ширину 276px чтобы текст всегда помещался в 300px SVG.
  -->
  <text
    x="150" y="255"
    text-anchor="middle"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="48"
    font-weight="800"
    fill="#E8621A"
    textLength="276"
    lengthAdjust="spacingAndGlyphs"
    class="lt">НОВОСЁЛА</text>
</svg>
